version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosec
  settings:
    gosec:
      excludes:
        # G104 (unhandled errors) overlaps with errcheck and we
        # intentionally ignore some Close errors via the '_ =' pattern.
        - G104
  exclusions:
    rules:
      # Test files routinely call Close() without checking and use
      # reflect.DeepEqual with errors. None of these are real concerns
      # in test code.
      - path: _test\.go
        linters:
          - errcheck
          - gosec

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
