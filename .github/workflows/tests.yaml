name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: ['1.24', 'stable']
    steps:
      -
        name: Checkout
        uses: actions/checkout@v6
      -
        name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
      -
        name: Run go test
        run: |
          go mod tidy
          go test -race -v ./...
      -
        name: Run golangci-lint
        if: matrix.go-version == 'stable'
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4

  # Aggregator job kept under the stable name "tests" so the branch
  # protection required check does not need to be reconfigured every
  # time the matrix changes.
  tests:
    runs-on: ubuntu-latest
    needs: test
    if: always()
    steps:
      - name: Check matrix results
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "matrix job failed: ${{ needs.test.result }}"
            exit 1
          fi
